services:
  db:
    image: mysql:8.0
    container_name: nrm-wp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: nrm-wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-nrm_}
    volumes:
      - wp_data:/var/www/html
      - ./themes:/var/www/html/wp-content/themes/psia-nrm
      - ./plugins/nrm-import.php:/var/www/html/wp-content/plugins/nrm-import.php
      - ./plugins/nrm-forms.php:/var/www/html/wp-content/plugins/nrm-forms.php
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./uploads:/var/www/html/wp-content/uploads
      - ./people.json:/var/www/people.json
      - ./events.json:/var/www/events.json
      - ./pages.json:/var/www/pages.json
      - ./cert-updates.json:/var/www/cert-updates.json
      - ./members.json:/var/www/members.json

volumes:
  db_data:
  wp_data:
